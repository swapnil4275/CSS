<!-- Demonstrate grid repeat -->

<html>

<head>
    <title>grid_repeat</title>

    <link rel="stylesheet" href="../css/grid_repeat.css">

</head>

<body>

    <h1>grid: repeat</h1>
    
    <h3>grid-template-columns: repeat(2, 2fr);</h3>
    <h3>grid-template-rows: repeat(3, 1fr);</h3>

    <div class="container1">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
    </div>

</body>

</html>
