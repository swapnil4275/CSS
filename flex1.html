<!-- Demonstrate flexbox  -->

<html>

<head>
    <title>Flexbox</title>

    <style>
        
        .container {
            display: flex;
            background-color: gray;
        }

        div  {
            background-color: aqua;
            margin: 10px;
            padding: 20px;
        }

    </style>
</head>

<body>

    <h1>Flex Container</h1>

    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
    </div>

</body>

</html>
