<!-- Demonstrate grid auto-fit -->

<html>

<head>
    <title>grid_auto-fit</title>

    <style>
        .container1 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .box {
            margin: 10px;
            padding: 10px;
            background-color: lightblue;
            text-align: center;
            font-size: 30px;
        }

    </style>

</head>

<body>

    <h1>grid: auto-fit</h1>
    
    <h3>grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));</h3>


    <div class="container1">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
    </div>

</body>

</html>
