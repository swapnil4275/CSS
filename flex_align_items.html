<!-- Demonstrate Flex align-items property -->

<html>

<head>
    <title>flex align-items</title>

    <!-- link css file  -->
    <link rel="stylesheet" href=../css/flex_align_items.css>
</head>

<body>

    <h4>align-items worked on cross axis (vertical alignment)</h4>

    <!-- flex align-items: stretch;  -->
    <h3>align-items: stretch;</h3>
    <div class="container1">
        <div class="box1">box 1.1 </div>
        <div class="box1">box 1.2</div>
        <div class="box1">box 1.3</div>
    </div>
    <hr>

    <!-- flex align-items: center;  -->
    <h3>flex align-items: center;</h3>
    <div class="container2">
        <div class="box2">box 2.1</div>
        <div class="box2">box 2.2</div>
        <div class="box2">box 2.3</div>
    </div>
    <hr>

    <!-- flex align-items: flex-start;  -->
    <h3>flex align-items: flext-start;</h3>
    <div class="container3">
        <div class="box3">box 3.1</div>
        <div class="box3">box 3.2</div>
        <div class="box3">box 3.3</div>
    </div>
    <hr>

    <!-- flex align-items: flex-end;  -->
    <h3>flex align-items: flex-end;</h3>
    <div class="container4">
        <div class="box4">box 4.1</div>
        <div class="box4">box 4.2</div>
        <div class="box4">box 4.3</div>
    </div>

</body>
</html>
