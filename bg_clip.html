<!-- Demonstrate Background clip property  -->

<html>

<head>
    <title>clip property</title>

    <link rel="stylesheet" href="../css/bg_clip.css">
</head>

<body>

    <h1>Background Clip Property</h1>

    <p>background-clip: border-box; (default):</p>
    <div id="border_box">
        <p>The background extends behind the border.</p>
    </div>


    <p>background-clip: padding-box;</p>
    <div id="padding_box">
        <p>The background extends to the inside edge of the border.</p>
    </div>


    <p>background-clip: content_box;</p>
    <div id="content_box">
        <p>The background extends to the edge of the content box.</p>
    </div>

</body>

</html>
