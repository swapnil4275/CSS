<!-- Demonstrate RGBA color  -->

<html>
    <head>
        <title>RGBA color</title>

        <!-- link .css file  -->
        <link rel="stylesheet" href="../css/RGBA_color.css">
    </head>

    <body>

        <h1>RGBA color</h1>

        <h3>Red, Green, Blue, Alpha</h3>

        <h4>RGB range = 0 to 255.</h4>
        <h4>Alpha range = 0 to 1.</h4>

        <p class="c1">rgba(255,100,70,0)</p>

        <p class="c2">rgba(255,100,70,0.2)</p>

        <p class="c3">rgba(255,100,70,0.4)</p>

        <p class="c4">rgba(255,100,70,0.6)</p>

        <p class="c5">rgba(255,100,70,0.8)</p>

        <p class="c6">rgba(255,100,70,1)</p>

    </body>
</html>
