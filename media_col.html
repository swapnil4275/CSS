<!-- Demonstrate Media Quearies for Columns -->

<html>

<head>
    <title>Media quearies columns</title>

    <style>

        * {
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
        }

        .column {
            flex: 25%;
            padding: 20px;
        }


        @media screen and (max-width:900px){
            .column {
                flex: 50%;
            }
        } 
        

    </style>
</head>

<body>

    <div class="container">

        <div class="column" style="background-color: rgb(163, 163, 163);">
            <h2>Column 1</h2>
            <p>Some Text...</p>
        </div>

        <div class="column" style="background-color: #bbb;">
            <h2>Column 2</h2>
            <p>Some Text...</p>
        </div>

        <div class="column" style="background-color: #ccc;">
            <h2>Column 3</h2>
            <p>Some Text...</p>
        </div>

        <div class="column" style="background-color: #ddd;">
            <h2>Column 4</h2>
            <p>Some Text...</p>
        </div>

    </div>

</body>

</html>
