
<!-- Demonstrate [attribute~="value"] selector  -->

<html>
    <head>
        <title>[attribute~="value"]</title>

        <!-- link .css file  -->
        <link rel="stylesheet" href="..\css\attribute_till_value_sel.css">
    </head>

    <body>

        <h2>CSS [attribute~="value"] Selector</h2>
        
        <p>All images with the title attribute containing the word "flower" get a yellow border.</p>

        <img src="..\css\images\flower-1.jpg" title="flower" width="300" height="200">

        <img src="..\css\images\flower-2.jpg" title="tree" width="300" height="200">

        <img src="..\css\images\flower-3.jpg" title="grass flower" width="300" height="200">

    </body>
</html>
