Demonstrate @Media

<html>

<head>
    <title>Media Queries</title>

    <style>
        body {
            background-color: aqua;
        }

        @media screen and (min-width:480px) {
            body {
                background-color: red;
            }
        }
    </style>
</head>

<body>

    <h1>@media Queries</h1>

    <p>The media query is applied if the media type is screen, and the viewport width is 480px or more.</p>

</body>

</html>
