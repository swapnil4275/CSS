<!-- Demonstrate :visited interactive pseudo class selector  -->

<html>
    <head>
        <title>visited interactive pseudo class selector</title>

        <link rel="stylesheet" href="..\css\visited_pseudo_cls_sel.css">
    </head>

    <body>

        <h1>:visited interactive pseudo class selector</h1>

        <label for="goo">Open Google :></label>
        <a href="https://www.google.com" target="_blank" id="goo">click here -></a>

        <br>

        <label for="w3">Open W3Schcools :></label>
        <a href="https://www.w3schools.com" target="_blank" id="w3">click here -></a>

        <br>

        <label for="click">Open clickup :></label>
        <a href="https://app.clickup.com/" target="_blank" id="click">click here -></a>

        <br>

        <label for="insta">Open instagram :></label>
        <a href="https://www.instagram.com/" target="_blank" id="insta">click here -></a>


    </body>
</html>
