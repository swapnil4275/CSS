<!-- Demonstrate Text Decoration line Property  -->

<html>

<head>
    <title>text decoration line</title>

    <link rel="stylesheet" href="../css/text_decoration_line.css">
</head>

<body>

    <h1>Demonstrate text-decoration-line property</h1>
    <h3>text-decoration-line: value;</h3>

    <p class="c1">This is some text with a line on top  value- <b><q>overline</q></b></p>
    <br>

    <p class="c2">this is some text with an underline  value- <b><q>underline</q></b></p>
    <br>

    <p class="c3">this is some text with a line-through  value- <b><q>line-through</q></b></p>
    <br>

    <p class="c4">This is some text with an <b>overline</b> and an <b>underline</b></p>

</body>

</html>
