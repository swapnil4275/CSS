Demonstrate @Media 

<html>

<head>
    <title>Media Queries</title>

    <style>

        body {
            background-color: red;
        }

        @media screen and (min-width: 480px) and (max-width: 700px){
            body {
                background-color: rgba(0, 255, 4, 0.941);
            }
        }

    </style>
</head>

<body>
    
    <h1>@media Queries</h1>

    <p>The media query is applied if the media type is screen, and the viewport width is 480px or more.</p>

</body>

</html>
