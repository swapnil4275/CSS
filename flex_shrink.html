<!-- Demonstrate flex-basis property  -->

<html>

<head>
    <title>flex basis</title>

    <style>
        .box {
            margin: 40px;
            padding: 20px;
            border: 1px red solid;
        }

        .container1 {
            display: flex;
            flex-wrap: nowrap;
        }

        .box1 {
            flex-basis: 200px;
        }
    </style>
</head>

<body>
    <h1>flex basis</h1>
    <hr>

    <h3>flex-basis: value;</h3>
    <div class="container1">
        <div class="box1 box">box 1.1</div>
        <div class="box2 box">box 1.2</div>
        <div class="box3 box">box 1.3</div>
        <div class="box4 box">box 1.4</div>
        <div class="box5 box">box 1.5</div>
        <div class="box6 box">box 1.6</div>
    </div>

</body>

</html>
