<!-- Demonstrate List Style Position  -->

<html>

<head>
    <title>List Style Position</title>

    <link rel="stylesheet" href="../css/list_style_position.css">
</head>

<body>

    <h1>List Style Position</h1>

    <h3>inside;  ,outside;</h3>

    <br>

    <h3>list-style-position: inside;</h3>
    <ol class="in">
        <li>Tea</li>
        <li>Coffee</li>
        <li>Lassi</li>
    </ol>

    <hr>

    <h3>list-style-position: outside;</h3>
    <ol class="out">
        <li>Tea</li>
        <li>Coffee</li>
        <li>Lassi</li>
    </ol>

</body>

</html>
