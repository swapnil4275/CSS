<!-- Demonstrate flex flow  -->

<html>

<head>
    <title>flex flow</title>

    <style>
        .container1 {
            display: flex;
            flex-flow: column wrap;
            width: 500px;
            height: 500px;
        }

        .box {
            margin: 25px;
            padding: 20px;
            border: 1px red solid;
        }
    </style>
</head>

<body>

    <h1>flex flow</h1>
    <hr>

    <!-- flex-wrap: wrap; -->
    <h3>flex-flow: column wrap;</h3>
    <div class="container1">
        <div class="box">box 1.1</div>
        <div class="box">box 1.2</div>
        <div class="box">box 1.3</div>
        <div class="box">box 2.1</div>
        <div class="box">box 2.2</div>
        <div class="box">box 2.3</div>
        <div class="box">box 3.1</div>
        <div class="box">box 3.2</div>
        <div class="box">box 3.3</div>
        <div class="box">box 4.1</div>
        <div class="box">box 4.2</div>
        <div class="box">box 4.3</div>
    </div>

</body>

</html>
