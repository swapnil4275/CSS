<!-- Demonstrate grid columns property -->

<html>

<head>
    <title>grid_columns</title>

    <link rel="stylesheet" href="../css/grid_column.css">
    
</head>

<body>

    <h1>grid-column</h1>
    <p>grid-template-columns: 300px 300px;</p>
    <h3>.box1 {grid-column: 1/3;}</h3>

    <h3>.box4 {grid-column: span 2;}</h3>

    <div class="container1">
        <div class="box box1">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box box4">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
    </div>

</body>

</html>
