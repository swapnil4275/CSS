<!-- Demonstrate flex-grow property  -->

<html>

<head>
    <title>flex grow</title>

    <style>
        .box {
            margin: 25px;
            padding: 20px;
            border: 1px red solid;
        }

        .container1 {
            display: flex;
            flex-wrap: wrap;
        }

        .box1 {
            flex-grow: 1;
        }
    </style>
</head>

<body>
    <h1>flex grow</h1>
    <hr>

    <h3>flex-grow: value;</h3>
    <div class="container1">
        <div class="box1 box">box 1.1</div>
        <div class="box2 box">box 1.2</div>
        <div class="box3 box">box 1.3</div>
        <div class="box4 box">box 1.4</div>
        <div class="box5 box">box 1.5</div>
        <div class="box6 box">box 1.6</div>
    </div>

</body>

</html>
