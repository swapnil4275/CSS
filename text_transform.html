<!-- Demonstrate Text Transform  -->

<html>

<head>
    <title>Text Transform</title>

    <link rel="stylesheet" href="../css/text_transform.css">
</head>

<body>

    <h1>Text Transform</h1>
    <h3>text-transform: uppercase, lowercase, capitalize.</h3>

    <br>

    <div>
        <p class="c1">This text is transformed to uppercase.</p>
        <br>

        <p class="c2">This text is transformed to lowercase.</p>
        <br>

        <p class="c3">This text is capitalized.</p>
    </div>

</body>

</html>
